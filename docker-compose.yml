version: '3.9'
services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install -r requirements.txt && python app.py"
    environment:
      - HOUSE_EDGE=0.05
      - ALBY_API_URL=https://api.getalby.com
      - ALBY_TOKEN=
    ports:
      - '5000:5000'

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - '5173:5173'
    depends_on:
      - backend
