services:
  - type: web
    name: aetherion-palace
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT web.merged_oracle_palace:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: aetherion-p2p-node
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 core/p2p_network_core.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: aetherion-miner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 core/mining_orchestrator.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: aetherion-vulture
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 core/aetherion_vulture.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0