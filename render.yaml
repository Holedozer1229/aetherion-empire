services:
  - type: web
    name: aetherion-palace
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT merged_oracle_palace:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: ore-fission-100x
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 ore_miner_core.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: ui-iii-merge-miner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 ui_iii_merge_miner.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: skynt-lightning-agent
    env: node
    buildCommand: npm install
    startCommand: node skynt_agent.js
    envVars:
      - key: NODE_VERSION
        value: 20.20.2