name: Remix Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Solidity Compiler
        uses: niklasvg/solc-action@v1
        with:
          solc-version: '0.8.19'

      - name: Build Empire Contract
        run: |
          mkdir -p build
          # Direct compilation of the final contract
          solc --bin --abi AetherionFlashHaul_Final.sol -o build/

      - name: Archive Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/