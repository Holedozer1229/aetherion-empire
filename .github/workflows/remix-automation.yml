name: Remix Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Solidity Compiler (solc v0.8.19)
        run: |
          sudo wget -O /usr/bin/solc https://github.com/ethereum/solidity/releases/download/v0.8.19/solc-static-linux
          sudo chmod +x /usr/bin/solc
          solc --version

      - name: Build Empire Contract
        run: |
          mkdir -p build
          solc --bin --abi AetherionFlashHaul_Final.sol -o build/

      - name: Archive Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/